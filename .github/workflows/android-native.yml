name: Android Native

on:
  push:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      BABYLOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.BABYLOG_RELEASE_KEYSTORE_BASE64 }}
      BABYLOG_RELEASE_STORE_PASSWORD: ${{ secrets.BABYLOG_RELEASE_STORE_PASSWORD }}
      BABYLOG_RELEASE_KEY_ALIAS: ${{ secrets.BABYLOG_RELEASE_KEY_ALIAS }}
      BABYLOG_RELEASE_KEY_PASSWORD: ${{ secrets.BABYLOG_RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: JVM smoke tests
        shell: bash
        run: |
          cd android-native
          mkdir -p smoke-tests/out
          ANDROID_JAR="$ANDROID_HOME/platforms/android-36/android.jar"
          JSON_JAR="$RUNNER_TEMP/org-json-20240303.jar"
          OKHTTP_JAR="$RUNNER_TEMP/okhttp-4.12.0.jar"
          OKIO_JAR="$RUNNER_TEMP/okio-jvm-3.6.0.jar"
          KOTLIN_STDLIB_JAR="$RUNNER_TEMP/kotlin-stdlib-1.9.24.jar"
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar" \
            -o "$JSON_JAR"
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://repo1.maven.org/maven2/com/squareup/okhttp3/okhttp/4.12.0/okhttp-4.12.0.jar" \
            -o "$OKHTTP_JAR"
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://repo1.maven.org/maven2/com/squareup/okio/okio-jvm/3.6.0/okio-jvm-3.6.0.jar" \
            -o "$OKIO_JAR"
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-stdlib/1.9.24/kotlin-stdlib-1.9.24.jar" \
            -o "$KOTLIN_STDLIB_JAR"
          SMOKE_CP="$JSON_JAR:$OKHTTP_JAR:$OKIO_JAR:$KOTLIN_STDLIB_JAR:$ANDROID_JAR"
          EXCLUDED_APP_SOURCES=(
            "app/src/main/java/app/babylog/nativeapp/BabyLogApplication.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogFileProvider.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogReminderScheduler.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogRoomCollectionStore.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogRoomDatabase.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogRoomJsonDao.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogRoomJsonRow.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogSyncAttachmentDownloadWorker.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogSyncPullWorker.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogSyncPushWorker.java"
            "app/src/main/java/app/babylog/nativeapp/BabyLogWorkManagerSyncTrigger.java"
          )
          mapfile -t APP_SOURCES < <(
            find app/src/main/java -name "*.java" | sort | grep -v -F -f <(printf '%s\n' "${EXCLUDED_APP_SOURCES[@]}")
          )
          mapfile -t SMOKE_SOURCES < <(find smoke-tests -name "*.java" | sort)
          javac -encoding UTF-8 \
            -cp "$SMOKE_CP" \
            -d smoke-tests/out \
            "${APP_SOURCES[@]}" \
            "${SMOKE_SOURCES[@]}"
          while IFS= read -r test_file; do
            test_class="$(basename "$test_file" .java)"
            if grep -q '^package app\.babylog\.nativeapp;' "$test_file"; then
              test_class="app.babylog.nativeapp.$test_class"
            fi
            java -cp "smoke-tests/out:$SMOKE_CP" "$test_class"
          done < <(find smoke-tests -name "*SmokeTest.java" | sort)
      - name: Assemble debug
        run: cd android-native && ./gradlew :app:assembleDebug --console=plain

      - name: Lint debug
        run: cd android-native && ./gradlew :app:lintDebug --console=plain

      - name: Detekt
        run: cd android-native && ./gradlew :app:detekt --console=plain

      - name: Prepare release signing
        if: env.BABYLOG_RELEASE_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          cd android-native
          echo "$BABYLOG_RELEASE_KEYSTORE_BASE64" | base64 --decode > release.jks
          {
            echo "BABYLOG_RELEASE_STORE_FILE=release.jks"
            echo "BABYLOG_RELEASE_STORE_PASSWORD=$BABYLOG_RELEASE_STORE_PASSWORD"
            echo "BABYLOG_RELEASE_KEY_ALIAS=$BABYLOG_RELEASE_KEY_ALIAS"
            echo "BABYLOG_RELEASE_KEY_PASSWORD=$BABYLOG_RELEASE_KEY_PASSWORD"
          } > signing.properties

      - name: Assemble signed release
        if: env.BABYLOG_RELEASE_KEYSTORE_BASE64 != ''
        run: cd android-native && ./gradlew :app:assembleRelease --console=plain

