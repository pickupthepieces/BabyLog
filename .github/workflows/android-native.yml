name: Android Native

on:
  push:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      BABYLOG_RELEASE_KEYSTORE_BASE64: ${{ secrets.BABYLOG_RELEASE_KEYSTORE_BASE64 }}
      BABYLOG_RELEASE_STORE_PASSWORD: ${{ secrets.BABYLOG_RELEASE_STORE_PASSWORD }}
      BABYLOG_RELEASE_KEY_ALIAS: ${{ secrets.BABYLOG_RELEASE_KEY_ALIAS }}
      BABYLOG_RELEASE_KEY_PASSWORD: ${{ secrets.BABYLOG_RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: JVM smoke tests
        shell: bash
        run: |
          cd android-native
          mkdir -p smoke-tests/out
          ANDROID_JAR="$ANDROID_HOME/platforms/android-36/android.jar"
          JSON_JAR="$RUNNER_TEMP/org-json-20240303.jar"
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar" \
            -o "$JSON_JAR"
          SMOKE_CP="$JSON_JAR:$ANDROID_JAR"
          javac -encoding UTF-8 \
            -cp "$SMOKE_CP" \
            -d smoke-tests/out \
            app/src/main/java/app/babylog/nativeapp/BabyLogDomain.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogFormatters.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogImageUtils.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogFetalGrowthReference.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogWeightGainCalculator.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogDueDateCalculator.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogPreVisitQuestionStore.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogReminderStore.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogVisitSummaryExporter.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSmartConfigStore.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSmartInput.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSmartVisionClient.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSmartTextClient.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSpeechToTextProtocol.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSyncProtocol.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogFamilyKeyDeriver.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogPayloadCipher.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogAttachmentCipher.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSyncSecretStore.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogRemoteSyncClient.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSyncPushOrchestrator.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSyncPullOrchestrator.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogSyncAttachmentDownloader.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogDisclaimerPolicy.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogRepositoryStringStore.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogAttachmentBlobStore.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogAttachmentInputBuilder.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogRepository.java \
            app/src/main/java/app/babylog/nativeapp/BabyLogService.java \
            smoke-tests/BabyLogDisclaimerPolicySmokeTest.java \
            smoke-tests/BabyLogSmartConfigStoreSmokeTest.java \
            smoke-tests/BabyLogDomainSmokeTest.java \
            smoke-tests/BabyLogFormattersSmokeTest.java \
            smoke-tests/BabyLogImageUtilsSmokeTest.java \
            smoke-tests/BabyLogFetalGrowthReferenceSmokeTest.java \
            smoke-tests/BabyLogWeightGainCalculatorSmokeTest.java \
            smoke-tests/BabyLogDueDateCalculatorSmokeTest.java \
            smoke-tests/BabyLogReminderStoreSmokeTest.java \
            smoke-tests/BabyLogVisitSummaryExporterSmokeTest.java \
            smoke-tests/BabyLogSmartInputSmokeTest.java \
            smoke-tests/BabyLogSmartVisionClientSmokeTest.java \
            smoke-tests/BabyLogSmartTextClientSmokeTest.java \
            smoke-tests/BabyLogSpeechToTextProtocolSmokeTest.java \
            smoke-tests/BabyLogSyncProtocolSmokeTest.java \
            smoke-tests/BabyLogFamilyKeyDeriverSmokeTest.java \
            smoke-tests/BabyLogPayloadCipherSmokeTest.java \
            smoke-tests/BabyLogAttachmentCipherSmokeTest.java \
            smoke-tests/BabyLogSyncSecretStoreSmokeTest.java \
            smoke-tests/BabyLogRemoteSyncClientSmokeTest.java \
            smoke-tests/BabyLogAttachmentBlobStoreSmokeTest.java \
            smoke-tests/BabyLogAttachmentInputBuilderSmokeTest.java \
            smoke-tests/BabyLogSyncPushOrchestratorSmokeTest.java \
            smoke-tests/BabyLogSyncPullOrchestratorSmokeTest.java \
            smoke-tests/BabyLogServiceSmokeTest.java
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogDisclaimerPolicySmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSmartConfigStoreSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogDomainSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogFormattersSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogImageUtilsSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogFetalGrowthReferenceSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogWeightGainCalculatorSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogDueDateCalculatorSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogReminderStoreSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogVisitSummaryExporterSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSmartInputSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSmartVisionClientSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSmartTextClientSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSpeechToTextProtocolSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSyncProtocolSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogFamilyKeyDeriverSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogPayloadCipherSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogAttachmentCipherSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSyncSecretStoreSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogRemoteSyncClientSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogAttachmentBlobStoreSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogAttachmentInputBuilderSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSyncPushOrchestratorSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogSyncPullOrchestratorSmokeTest
          java -cp "smoke-tests/out:$SMOKE_CP" BabyLogServiceSmokeTest

      - name: Assemble debug
        run: cd android-native && ./gradlew :app:assembleDebug --console=plain

      - name: Lint debug
        run: cd android-native && ./gradlew :app:lintDebug --console=plain

      - name: Detekt
        run: cd android-native && ./gradlew :app:detekt --console=plain

      - name: Prepare release signing
        if: env.BABYLOG_RELEASE_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          cd android-native
          echo "$BABYLOG_RELEASE_KEYSTORE_BASE64" | base64 --decode > release.jks
          {
            echo "BABYLOG_RELEASE_STORE_FILE=release.jks"
            echo "BABYLOG_RELEASE_STORE_PASSWORD=$BABYLOG_RELEASE_STORE_PASSWORD"
            echo "BABYLOG_RELEASE_KEY_ALIAS=$BABYLOG_RELEASE_KEY_ALIAS"
            echo "BABYLOG_RELEASE_KEY_PASSWORD=$BABYLOG_RELEASE_KEY_PASSWORD"
          } > signing.properties

      - name: Assemble signed release
        if: env.BABYLOG_RELEASE_KEYSTORE_BASE64 != ''
        run: cd android-native && ./gradlew :app:assembleRelease --console=plain
